<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Golf course background -->
  <rect width="300" height="200" fill="#7CB342"/>
  
  <!-- Fairway -->
  <path d="M50 180 Q150 160 250 180" stroke="none" fill="#8BC34A" stroke-width="2"/>
  
  <!-- Tee box -->
  <rect x="40" y="170" width="20" height="20" fill="#5D4037" rx="2"/>
  
  <!-- Flag/hole -->
  <circle cx="250" cy="180" r="3" fill="#212121"/>
  <line x1="250" y1="180" x2="250" y2="160" stroke="#212121" stroke-width="2"/>
  <polygon points="250,160 250,170 260,165" fill="#F44336"/>
  
  <!-- Player positions and shots -->
  <!-- All players at tee -->
  <circle cx="50" cy="180" r="4" fill="#1976D2"/>
  <circle cx="50" cy="170" r="4" fill="#388E3C"/>
  <circle cx="50" cy="160" r="4" fill="#FFA726"/>
  
  <!-- All shots from tee -->
  <path d="M50 180 Q100 140 140 160" stroke="#1976D2" stroke-width="2" fill="none" stroke-dasharray="3,2" opacity="0.7"/>
  <path d="M50 170 Q100 130 150 165" stroke="#388E3C" stroke-width="2" fill="none" stroke-dasharray="3,2" opacity="0.7"/>
  <path d="M50 160 Q100 120 145 155" stroke="#FFA726" stroke-width="2" fill="none" stroke-dasharray="3,2" opacity="0.7"/>
  
  <!-- Best shot selection (green player's shot) -->
  <circle cx="150" cy="165" r="6" fill="#388E3C" stroke="#fff" stroke-width="2"/>
  <text x="160" y="165" font-family="Arial" font-size="12" fill="#fff">BEST</text>
  
  <!-- All players move to best shot -->
  <circle cx="150" cy="165" r="3" fill="#1976D2" opacity="0.8"/>
  <circle cx="145" cy="162" r="3" fill="#388E3C" opacity="0.8"/>
  <circle cx="155" cy="168" r="3" fill="#FFA726" opacity="0.8"/>
  
  <!-- Second shots from best position -->
  <path d="M150 165 Q200 150 250 180" stroke="#4CAF50" stroke-width="2" fill="none" stroke-dasharray="3,2"/>
  
  <!-- Title -->
  <text x="150" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">SCRAMBLE</text>
  <text x="150" y="50" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle">All play from best shot</text>
</svg>