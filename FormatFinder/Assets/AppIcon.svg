<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66BB6A;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="flagGradient">
      <stop offset="0%" style="stop-color:#FF5252;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F44336;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGradient)"/>
  
  <!-- Golf green circle -->
  <circle cx="512" cy="512" r="380" fill="#4CAF50" opacity="0.3"/>
  <circle cx="512" cy="512" r="350" fill="#4CAF50" opacity="0.5"/>
  
  <!-- Golf hole -->
  <circle cx="512" cy="580" r="40" fill="#1B1B1B"/>
  <ellipse cx="512" cy="580" rx="40" ry="20" fill="#000000"/>
  
  <!-- Flag pole -->
  <rect x="507" y="280" width="10" height="300" fill="#FFFFFF"/>
  
  <!-- Flag -->
  <path d="M517 280 L517 380 L620 330 Z" fill="url(#flagGradient)"/>
  
  <!-- Golf balls representing different formats -->
  <circle cx="380" cy="420" r="25" fill="#FFFFFF"/>
  <circle cx="385" cy="415" r="3" fill="#E0E0E0"/>
  <circle cx="375" cy="415" r="3" fill="#E0E0E0"/>
  <circle cx="380" cy="425" r="3" fill="#E0E0E0"/>
  
  <circle cx="640" cy="420" r="25" fill="#FFFFFF"/>
  <circle cx="645" cy="415" r="3" fill="#E0E0E0"/>
  <circle cx="635" cy="415" r="3" fill="#E0E0E0"/>
  <circle cx="640" cy="425" r="3" fill="#E0E0E0"/>
  
  <circle cx="440" cy="680" r="25" fill="#FFFFFF"/>
  <circle cx="445" cy="675" r="3" fill="#E0E0E0"/>
  <circle cx="435" cy="675" r="3" fill="#E0E0E0"/>
  <circle cx="440" cy="685" r="3" fill="#E0E0E0"/>
  
  <circle cx="580" cy="680" r="25" fill="#FFFFFF"/>
  <circle cx="585" cy="675" r="3" fill="#E0E0E0"/>
  <circle cx="575" cy="675" r="3" fill="#E0E0E0"/>
  <circle cx="580" cy="685" r="3" fill="#E0E0E0"/>
  
  <!-- Format Finder text/logo stylized -->
  <text x="512" y="850" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#FFFFFF" text-anchor="middle">FF</text>
</svg>